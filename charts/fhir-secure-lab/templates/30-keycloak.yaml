apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  KC_ADMIN: {{ .Values.keycloak.adminUser }}
  KC_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword }}
  OAUTH_PROXY_CLIENT_SECRET: {{ .Values.keycloak.secrets.oauthProxyClientSecret }}
  SERVER_CLIENT_SECRET: {{ .Values.keycloak.secrets.serverClientSecret }}
  COOKIE_SECRET: {{ .Values.keycloak.secrets.cookieSecret }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: {{ .Values.global.namespace }}
data:
  fhir-lab-realm.json: |
    {{
      "realm": "{{ .Values.keycloak.realm.name }}",
      "enabled": true,
      "clients": [
        {{
          "clientId": "{{ .Values.keycloak.realm.clientPublicId }}",
          "publicClient": true,
          "redirectUris": ["{{ .Values.keycloak.realm.postmanRedirectUri }}"],
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "attributes": {{"pkce.code.challenge.method": "S256"}},
          "defaultClientScopes": ["profile", "email"]
        }},
        {{
          "clientId": "{{ .Values.keycloak.realm.clientConfidentialId }}",
          "secret": "{{ .Values.keycloak.secrets.serverClientSecret }}",
          "serviceAccountsEnabled": true,
          "publicClient": false,
          "redirectUris": ["*"],
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "authorizationServicesEnabled": false,
          "protocol": "openid-connect"
        }},
        {{
          "clientId": "{{ .Values.keycloak.realm.oauthProxyClientId }}",
          "secret": "{{ .Values.keycloak.secrets.oauthProxyClientSecret }}",
          "publicClient": false,
          "redirectUris": ["{{ .Values.keycloak.realm.oauthProxyRedirectUri }}"],
          "standardFlowEnabled": true,
          "protocol": "openid-connect"
        }}
      ],
      "users": [
        {{
          "username": "student",
          "enabled": true,
          "email": "student@example.com",
          "emailVerified": true,
          "credentials": [{{"type":"password","value":"student","temporary":false}}]
        }}
      ]
    }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgres-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgres
  namespace: {{ .Values.global.namespace }}
  labels: { app: keycloak-postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: keycloak-postgres }
  template:
    metadata:
      labels: { app: keycloak-postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.keycloak.db.image }}
          env:
            - name: POSTGRES_DB
              value: "{{ .Values.keycloak.db.database }}"
            - name: POSTGRES_USER
              value: "{{ .Values.keycloak.db.username }}"
            - name: POSTGRES_PASSWORD
              value: "{{ .Values.keycloak.db.password }}"
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: keycloak-postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app: keycloak-postgres }
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Values.global.namespace }}
  labels: { app: keycloak }
spec:
  replicas: {{ .Values.keycloak.replicas }}
  selector:
    matchLabels: { app: keycloak }
  template:
    metadata:
      labels: { app: keycloak }
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args:
            - "start"
            - "--hostname-strict=false"
            - "--http-enabled=true"
            - "--http-port={{ .Values.keycloak.service.port }}"
            - "--proxy=edge"
            - "--spi-login-protocol-openid-connect-legacy-logout-redirect-uri=true"
            - "--import-realm"
            - "--db=postgres"
            - "--db-url=jdbc:postgresql://keycloak-postgres.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.keycloak.db.database }}"
            - "--db-username={{ .Values.keycloak.db.username }}"
            - "--db-password={{ .Values.keycloak.db.password }}"
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom: { secretKeyRef: { name: keycloak-secrets, key: KC_ADMIN } }
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: keycloak-secrets, key: KC_ADMIN_PASSWORD } }
          ports: [{ containerPort: {{ .Values.keycloak.service.port }} }]
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-import
          configMap: { name: keycloak-realm }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app: keycloak }
  ports:
    - name: http
      port: {{ .Values.keycloak.service.port }}
      targetPort: {{ .Values.keycloak.service.port }}
