apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: {{ .Values.global.namespace }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: {{ .Values.envoy.service.port }} }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: hapi
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/fhir" }
                              route: { cluster: hapi, timeout: 0s }
                    http_filters:
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            keycloak:
                              issuer: "http://keycloak.{{ .Values.global.namespace }}.svc.cluster.local:8080/realms/{{ .Values.keycloak.realm.name }}"
                              remote_jwks:
                                http_uri:
                                  uri: "http://keycloak.{{ .Values.global.namespace }}.svc.cluster.local:8080/realms/{{ .Values.keycloak.realm.name }}/protocol/openid-connect/certs"
                                  cluster: keycloak
                                  timeout: 5s
                              forward: true
                              payload_in_metadata: "jwt_payload"
                              {{- if .Values.envoy.jwt.requireAudience }}
                              audiences: ["{{ .Values.envoy.jwt.requireAudience }}"]
                              {{- end }}
                          rules:
                            - match: { prefix: "/fhir" }
                              requires:
                                provider_name: keycloak
                      - name: envoy.filters.http.router
                        typed_config: { "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router }
      clusters:
        - name: hapi
          connect_timeout: 1s
          type: STRICT_DNS
          load_assignment:
            cluster_name: hapi
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: hapi-fhir.{{ .Values.global.namespace }}.svc.cluster.local
                          port_value: 8080
        - name: keycloak
          connect_timeout: 1s
          type: STRICT_DNS
          load_assignment:
            cluster_name: keycloak
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: keycloak.{{ .Values.global.namespace }}.svc.cluster.local
                          port_value: {{ .Values.keycloak.service.port }}
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: envoy }
  template:
    metadata:
      labels: { app: envoy }
    spec:
      containers:
        - name: envoy
          image: {{ .Values.envoy.image }}
          args: ["-c", "/etc/envoy/envoy.yaml"]
          ports:
            - containerPort: {{ .Values.envoy.service.port }}
            - containerPort: 9901
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app: envoy }
  ports:
    - name: http
      port: {{ .Values.envoy.service.port }}
      targetPort: {{ .Values.envoy.service.port }}
